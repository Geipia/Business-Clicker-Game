<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Clicker Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="account-info">
                <p>**** 7439</p>
                <p id="date">05/26</p>
            </div>
            <div class="balance">
                <p>Solde : <span id="balance">$0</span></p>
            </div>
        </div>
        <div class="click-area" id="clickArea">
            <p id="clickValue">$2.50 par clic</p>
        </div>
        <div class="menu">
            <div class="menu-item" data-section="investment">
                <img src="https://img.icons8.com/ios-filled/50/000000/investment-portfolio.png" alt="Investissement">
                <p>Investissement</p>
            </div>
            <div class="menu-item" data-section="enterprise">
                <img src="https://img.icons8.com/ios-filled/50/000000/enterprise.png" alt="Entreprise">
                <p>Entreprise</p>
            </div>
            <div class="menu-item" data-section="gains">
                <img src="https://img.icons8.com/ios-filled/50/000000/money-bag.png" alt="Gains">
                <p>Gains</p>
            </div>
            <div class="menu-item" data-section="articles">
                <img src="https://img.icons8.com/ios-filled/50/000000/news.png" alt="Articles">
                <p>Articles</p>
            </div>
            <div class="menu-item" data-section="profile">
                <img src="https://img.icons8.com/ios-filled/50/000000/user.png" alt="Profil">
                <p>Profil</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
