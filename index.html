<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Clicker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="account">
                <p>**** 7439</p>
                <p id="date">05/26</p>
            </div>
            <div class="balance">
                <p>Solde : <span id="balance">$0</span></p>
            </div>
        </header>
        
        <main class="main">
            <div class="click-zone" id="clickZone">
                <div class="click-value">
                    <p>$<span id="clickValue">2.50</span> par clic</p>
                </div>
            </div>
        </main>
        
        <nav class="nav">
            <div class="nav-item active" data-section="investment">
                <div class="nav-icon">
                    <img src="https://img.icons8.com/ios-filled/50/000000/investment-portfolio.png" alt="Investissement">
                </div>
                <p>Investissement</p>
            </div>
            <div class="nav-item" data-section="enterprise">
                <div class="nav-icon">
                    <img src="https://img.icons8.com/ios-filled/50/000000/enterprise.png" alt="Entreprise">
                </div>
                <p>Entreprise</p>
            </div>
            <div class="nav-item" data-section="gains">
                <div class="nav-icon">
                    <img src="https://img.icons8.com/ios-filled/50/000000/money-bag.png" alt="Gains">
                </div>
                <p>Gains</p>
            </div>
            <div class="nav-item" data-section="articles">
                <div class="nav-icon">
                    <img src="https://img.icons8.com/ios-filled/50/000000/news.png" alt="Articles">
                </div>
                <p>Articles</p>
            </div>
            <div class="nav-item" data-section="profile">
                <div class="nav-icon">
                    <img src="https://img.icons8.com/ios-filled/50/000000/user.png" alt="Profil">
                </div>
                <p>Profil</p>
            </div>
        </nav>
    </div>
    
    <div class="section-content" id="sectionContent"></div>
    
    <script src="script.js"></script>
</body>
</html>
